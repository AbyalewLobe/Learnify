services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: learnify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: learnify_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learnify-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: learnify-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - learnify-network

  # LocalStack for local AWS services (S3, SES, etc.)
  localstack:
    image: localstack/localstack:latest
    container_name: learnify-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"  # LocalStack gateway
      - "4510-4559:4510-4559"  # External services port range
    environment:
      - SERVICES=s3,ses
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - PERSISTENCE=1
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - learnify-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnify-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Server
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: info

      # Database (using Docker service names)
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/learnify_db
      DIRECT_URL: postgresql://postgres:postgres123@postgres:5432/learnify_db
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: learnify_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_POOL_MIN: 2
      DB_POOL_MAX: 20

      # Redis (using Docker service name)
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0

      # JWT
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production-learnify-2024
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-this-in-production-learnify-2024
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d

      # Stripe
      STRIPE_SECRET_KEY: sk_test_your_stripe_secret_key
      STRIPE_PUBLISHABLE_KEY: pk_test_your_stripe_publishable_key
      STRIPE_WEBHOOK_SECRET: whsec_your_webhook_secret
      STRIPE_CONNECT_CLIENT_ID: ca_your_connect_client_id

      # AWS
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: your_aws_access_key
      AWS_SECRET_ACCESS_KEY: your_aws_secret_key

      # AWS S3
      S3_BUCKET_VIDEOS: learnify-videos-dev
      S3_BUCKET_RESOURCES: learnify-resources-dev
      S3_BUCKET_PUBLIC: learnify-public-dev
      S3_BUCKET_UPLOADS: learnify-uploads-dev

      # AWS CloudFront
      CLOUDFRONT_DOMAIN: your-cloudfront-domain.cloudfront.net
      CLOUDFRONT_KEY_PAIR_ID: your_key_pair_id
      CLOUDFRONT_PRIVATE_KEY_PATH: ./keys/cloudfront-private-key.pem

      # AWS SES
      SES_FROM_EMAIL: noreply@learnify.com
      SES_FROM_NAME: Learnify Platform
      SES_REGION: us-east-1

      # AWS MediaConvert
      MEDIACONVERT_ENDPOINT: https://your-account-id.mediaconvert.us-east-1.amazonaws.com
      MEDIACONVERT_ROLE_ARN: arn:aws:iam::your-account:role/MediaConvertRole
      MEDIACONVERT_QUEUE_ARN: arn:aws:mediaconvert:us-east-1:your-account:queues/Default

      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100

      # File Upload Limits
      MAX_VIDEO_SIZE_MB: 2048
      MAX_RESOURCE_SIZE_MB: 100
      MAX_IMAGE_SIZE_MB: 10

      # Security
      BCRYPT_SALT_ROUNDS: 12
      PASSWORD_MIN_LENGTH: 8

      # Analytics
      ANALYTICS_BATCH_SIZE: 1000
      ANALYTICS_BATCH_INTERVAL_MS: 300000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - learnify-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  localstack_data:
    driver: local

networks:
  learnify-network:
    driver: bridge
